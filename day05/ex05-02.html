<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>position fixed</title>
    <style>
      .table-wrapper {
        max-height: 200px;
        overflow: auto;
      }
      table {
        width: 100%;
        /* border-collapse: collapse; */
        /* border-collapse: separate; */
        table-layout: fixed;
        border-spacing: 0;
        /* position: fixed; */
      }
      th,
      td {
        border: 1px solid #ddd;
        padding: 8px;
        text-align: center;
      }
      thead,
      tfoot {
        position: sticky;
        color: white;
        background-color: rgb(47, 100, 143);
      }
      thead {
        top: 0;
      }
      tfoot {
        bottom: 0;
      }
      #fix {
        position: fixed;
        right: 30px;
        bottom: 170px;
        background-color: rgb(46, 120, 231);
        padding: 10px;
        border-radius: 50%;
        width: 20px;
        height: 20px;
        font-size: 1.7em;
        color: white;
        text-align: center;
        line-height: 1;
        box-shadow: 5px 5px 20px 2px black;
      }
    </style>
  </head>
  <body>
    <h1>position fixed</h1>
    <hr />
    <a href="index.html">🏠홈으로</a><br />

    <!-- div.table-wrapper>table>thead>tr>th*4^^tbody>(tr>td*4)*10^^tfoot>tr>td*4 -->

      <table>

          </tr>

          </tr>

          </tr>
          <tr>
            <td>5</td>

          </tr>
          <tr>
            <td>6</td>

          <tr>

          </tr>
        </tbody>
        <tfoot>
          <tr>
            <td colspan="4">명단의 끝</td>
          </tr>
        </tfoot>
      </table>
    </div>
    <div id="fix">^</div>
  </body>
</html>
