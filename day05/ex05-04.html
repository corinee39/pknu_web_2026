<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>float 응용</title>
    <style>
      :root {
        --myred1: rgb(255, 5, 5);
        --myred2: rgb(255, 87, 87);
        --myred3: rgb(255, 170, 170);
        --mygreen1: rgb(0, 128, 0);
        --mygreen2: rgb(74, 238, 74);
        --mygreen3: rgb(191, 255, 191);
        --myblue1: rgb(84, 84, 255);
        --myblue2: rgb(128, 147, 255);
        --myblue3: rgb(174, 174, 255);
        --mypink1: rgb(255, 129, 150);
        --mypink2: rgb(255, 183, 195);
        --mypink3: rgb(255, 219, 225);
        --mypurple1: rgb(196, 82, 219);
        --mypurple2: rgb(222, 148, 236);
        --mypurple3: rgb(245, 194, 255);
      }
      header,
      footer {
        width: 300px;
        height: 40px;
        background-color: var(--myblue2);
        border: 5px solid var(--myblue1);
        box-sizing: border-box;
      }
      footer {
        background-color: var(--mypink2);
        border: 5px solid var(--mypink1);
      }
      nav {
        width: 50px;
        height: 250px;
        background-color: var(--mygreen3);
        border: 5px solid var(--mygreen2);
        box-sizing: border-box;
        float: left;
        /* opacity: 0.4; */
      }
      main {
        width: 250px;
        margin-left: 50px;
      }
      article {
        height: 50px;
        background-color: var(--mypurple3);
        border: 5px solid var(--mypurple1);
        box-sizing: border-box;
      }
      section {
        height: 200px;
        background-color: var(--mypurple2);
        border: 5px solid var(--mypurple1);
        box-sizing: border-box;
      }
    </style>
  </head>
  <body>
    <h1>float 응용(레이아웃)</h1>
    <hr />
    <a href="index.html">🏠홈으로</a><br />
    <!-- div.box>header{header}+div>nav{nav}+main>article{article}+section{section}^^footer{footer} -->
    <div class="box">
      <header>header</header>
      <div>
        <nav>nav</nav>
        <main>
          <article>article</article>
          <section>section</section>
        </main>
      </div>
      <footer>footer</footer>
    </div>
  </body>
</html>
