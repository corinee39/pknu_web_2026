<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>달력 실습</title>
    <style>
      :root {
        --cwidth: 293px;
        --cheight: 35px;
      }
      h2 {
        background-color: rgb(102, 165, 224);
        width: var(--cwidth);
        height: var(--cheight);
        text-align: center;
        color: white;
        margin-bottom: 3px;
      }
      div {
        width: var(--cwidth);
        background-color: rgb(255, 246, 226);
        height: 210px;
        text-align: center;
        padding: 5px;
        box-sizing: border-box;
      }
      div > div {
        width: 34px;
        height: 34px;
        border: 1px solid black;
        float: left;
        margin: 3px;
        padding-top: 3px;
        font-size: 1rem;
      }
      div > div:nth-of-type(7n) {
        color: blue;
      }
      div > div:nth-of-type(7),
      div > div:nth-of-type(7n + 1) {
        color: red;
      }
      div > div:nth-of-type(n + 17):nth-of-type(-n + 19) {
        color: rgb(10, 199, 10);
      }
      div > div:nth-of-type(n + 4):nth-of-type(-n + 10) {
        background-color: rgb(195, 246, 255);
      }
      div > div:nth-of-type(n + 13):nth-of-type(-n + 18) {
        background-color: yellow;
      }
      div > div:nth-of-type(n + 30) {
        background-color: rgb(198, 255, 207);
      }
    </style>
  </head>
  <body>
    <h1>달력 예제 실습</h1>
    <hr />
    <a href="index.html">🏠홈으로</a><br />

    <h2>2026년 4월 달력</h2>

      <div>5</div>
      <div>6</div>
      <div>7</div>
      <div>8</div>
      <div>9</div>
      <div>10</div>
      <div>11</div>
      <div>12</div>
      <div>13</div>
      <div>14</div>
      <div>15</div>
      <div>16</div>
      <div>17</div>
      <div>18</div>
      <div>19</div>
      <div>20</div>
      <div>21</div>
      <div>22</div>

      <div>26</div>

      <div>30</div>
    </div>
  </body>
</html>
