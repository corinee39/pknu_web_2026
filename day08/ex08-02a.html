<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title></title>
    <script>
      const inp = Number(prompt("점수를 입력하세요.", 100));
      console.log(typeof inp, inp);
      if (inp < 0 || inp > 100) {
        console.log("점수 입력이 잘못되었습니다.");
        document.write(`<h2>점수 입력이 잘못되었습니다. 다시 입력하세요.</h2>`);
      } else {
        if (inp == 100) {
          console.log("당신의 학점은 A+입니다.");
          document.write(`<h2>당신의 학점은 A+입니다. 참 잘했어요~ </h2>`);
        } else if (inp >= 90) {
          console.log("당신의 학점은 A입니다.");
          document.write(`<h2>당신의 학점은 A입니다.</h2>`);
        } else if (inp >= 80) {
          console.log("당신의 학점은 B입니다.");
          document.write(`<h2>당신의 학점은 B입니다.</h2>`);
        } else if (inp >= 70) {
          console.log("당신의 학점은 C입니다.");
          document.write(`<h2>당신의 학점은 C입니다.</h2>`);
        } else if (inp >= 60) {
          console.log("당신의 학점은 D입니다.");
          document.write(`<h2>당신의 학점은 D입니다.</h2>`);
        } else {
          console.log("당신의 학점은 F입니다.");
          document.write(`<h2>당신의 학점은 F입니다. 공부하세요! </h2>`);
        }
      }
    </script>
  </head>
  <body>
    <script></script>
  </body>
</html>
