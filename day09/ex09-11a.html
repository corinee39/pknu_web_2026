<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title></title>
    <style>
      #box {
        background-color: rgb(255, 239, 217);
        width: 400px;
        height: 300px;
        margin: 30% auto;
        padding: 40px 10px 40px 30px;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        justify-content: space-evenly;
      }
      #box > div {
        height: 30px;
        margin: 5px;
        background-color: rgb(161, 194, 255);
      }

      table {
        width: 400px;
        margin: 100px auto;
      }
      tr,
      th,
      td {
        background-color: cadetblue;
        color: white;
        box-shadow: 10px 10px 20px rgba(50, 50, 50, 0.5);
        padding: 10px;
        text-align: center;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <table>
      <tr>
        <th>아이템</th>
        <th>기본확률</th>
        <th>개수</th>
        <th>검증</th>
      </tr>
      <tr>
        <td>유니크</td>
        <td>3%</td>
        <td>30</td>
        <td>30</td>
      </tr>
      <tr>
        <td>레어</td>
        <td>10%</td>
        <td>100</td>
        <td>100</td>
      </tr>
      <tr>
        <td>매직</td>
        <td>30%</td>
        <td>300</td>
        <td>300</td>
      </tr>
      <tr>
        <td>일반</td>
        <td>57%</td>
        <td>570</td>
        <td>570</td>
      </tr>
    </table>
    <script></script>
  </body>
</html>
