<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      div {
        width: 500px;
        margin: 100px auto;
      }
    </style>
  </head>
  <body>
    <div>
      <canvas id="myChart"></canvas>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script>
      const ctx = document.getElementById("myChart");
      // const ctx = document.querySelector("#myChart");

      // 0~100까지 임의의 랜덤값을 배열(6)에 담아라
      const box = [];
      for (let i = 0; i < 6; i++) {
        const ran = Math.floor(Math.random() * 100);
        box.push(ran);
      }

      new Chart(ctx, {
        // type: "bar",
        type: "polarArea",
        data: {
          // labels: ["Red", "Blue", "Yellow", "Green", "Purple", "Orange"],
          labels: box,
          datasets: [
            {
              label: "# of Votes",
              // data: [12, 19, 13, 5, 2, 3],
              data: box,
              borderWidth: 1,
            },
          ],
        },
        options: {
          scales: {
            y: {
              beginAtZero: true,
            },
          },
        },
      });
    </script>
  </body>
</html>
