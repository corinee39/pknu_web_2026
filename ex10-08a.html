<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>함수표현식으로 게임</title>
  </head>
  <body>
    <label for="name">이름: </label>
    <input
      type="text"
      id="name"
      placeholder="영웅의 이름을 입력하세요."
    /><br />
    <label for="level">레벨: </label>
    <input
      type="text"
      id="level"
      placeholder="영웅의 레벨을 입력하세요."
    /><br />
    <label for="skill">스킬: </label>
    <input type="text" id="skill" placeholder="fire / ice / slow" /><br />
    <button id="btn">실행</button><br /><br />
    <div id="result"></div>

    <script>
      const result = document.getElementById("result");
      const btn = document.getElementById("btn");

      const lol = function (name, level = 1, cb) {
        result.innerHTML = "";
        result.innerHTML += "=========================<br>";
        result.innerHTML += `${name}님이 ${level}레벨이 되었습니다.<br>`;
        result.innerHTML += "=========================<br>";

        if (level >= 6) {
          result.innerHTML += `${name}님이 궁극기를 씁니다.<br>`;
          cb(level);
        } else {
          result.innerHTML += `${name}님이 깨작 평타를 때립니다.<br>`;
        }
      };

      const fire = (ff) => {
        for (let i = 1; i < ff + 1; i++) {
          result.innerHTML += `${ff}레벨이어서 ${i}개 메테오를 던집니다.<br>`;
        }
      };
      const ice = (ii) => {
        for (let i = 1; i < ii; i++) {
          result.innerHTML += `${ii}레벨이어서 ${i * 2}개 얼음을 던집니다.<br>`;
        }
      };
      const slow = (ss) => {
        for (let i = ss; i > 0; i--) {
          result.innerHTML += `${ss}레벨이어서 다리를 공격하여 이동속도를 ${i}% 줄입니다.<br>`;
        }
      };

      const getValue = () => {
        const nameInp = document.querySelector("#name").value;
        const levelInp = Number(document.querySelector("#level").value);
        const skillInp = document.querySelector("#skill").value;

        let selectedSkill;

        if (skillInp === "fire") {
          selectedSkill = fire;
        } else if (skillInp === "ice") {
          selectedSkill = ice;
        } else if (skillInp === "slow") {
          selectedSkill = slow;
        } else {
          result.innerHTML = "스킬은 fire / ice / slow 중 하나를 입력하세요.";
          return;
        }
        lol(nameInp, levelInp, selectedSkill);
      };

      btn.addEventListener("click", getValue);
    </script>
  </body>
</html>
